<!DOCTYPE html>

<html lang="pt-BR" th:replace="~{layout :: oEsqueletoGeral(~{:: #conteudo})}" xmlns:th="http://www.thymeleaf.org">

<div id="conteudo">

    <!-- Cabeçalho da página -->
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0">Consulta por Pendência do Servidor (Plano Incompleto)</h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="/painel">Início</a></li>
                        <li class="breadcrumb-item active">Pendência do Servidor</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>


    <!-- Conteúdo -->
    <div class="content">
        <div class="container-fluid">

            <div th:if="${pagina != null}">

                <div th:replace="~{componentes :: botaoExportarCsv('/view/planos/pendencia-servidor?format=csv')}"></div>

                <div th:replace="~{componentes :: agrupamentoServidorUnidadePlanos(${pagina.content})}"></div>

                <div th:replace="~{componentes :: paginacaoPadrao(${pagina}, '/view/planos/pendencia-servidor')}"></div>
            </div>

        </div>
    </div>
</div>

</html>
