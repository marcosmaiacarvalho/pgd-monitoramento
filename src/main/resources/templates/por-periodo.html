<!DOCTYPE html>

<html lang="pt-BR" th:replace="~{layout :: oEsqueletoGeral(~{:: #conteudo})}" xmlns:th="http://www.thymeleaf.org">

<div id="conteudo">

    <!-- Cabeçalho da página -->
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0">Consulta por Período</h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="/painel">Início</a></li>
                        <li class="breadcrumb-item active">Por Período</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <!-- Conteúdo -->
    <div class="content">
        <div class="container-fluid">
            <!-- Resultados -->
            <div th:if="${dadosBackend != null}">

                <!-- Dados do servidor-->
                <div th:replace="~{componentes :: agrupamentoServidorUnidadePlanos(${dadosBackend})}">
                    
                </div>
            </div>
        </div>
    </div>
</div>

</html>
