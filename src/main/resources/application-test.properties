# Habilita o console web para acessar via navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Configurações de conexão
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Exibe os comandos SQL no log
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
# Sempre rodar os scripts em perfil de teste e apontando para o seed.sql no perfil de test
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-test.sql
logging.level.org.springframework.jdbc.datasource.init=DEBUG
spring.jackson.property-naming-strategy=SNAKE_CASE
logging.file.name=${user.home}/h2data/logs/import-json.log